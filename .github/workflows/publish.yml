name: Publish Release

on:
  push:
    tags:
      - '**'

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-24.04
            artifact: native-linux-x86_64
            lib_name: libquickjs-java-wrapper.so
            c_flags: "-O2 -flto -ffunction-sections -fdata-sections"
            cxx_flags: "-O2 -flto -ffunction-sections -fdata-sections"
            link_flags: "-Wl,--gc-sections -Wl,--strip-all"
            parallel: nproc

          - name: macos-x86_64
            os: macos-14
            artifact: native-macos-x86_64
            lib_name: libquickjs-java-wrapper.dylib
            c_flags: "-O2 -flto -ffunction-sections -fdata-sections"
            cxx_flags: "-O2 -flto -ffunction-sections -fdata-sections"
            link_flags: "-Wl,-dead_strip"
            parallel: sysctl -n hw.logicalcpu

          - name: macos-arm64
            os: macos-15
            artifact: native-macos-arm64
            lib_name: libquickjs-java-wrapper.dylib
            c_flags: "-Os -flto -ffunction-sections -fdata-sections"
            cxx_flags: "-Os -flto -ffunction-sections -fdata-sections"
            link_flags: "-Wl,-dead_strip"
            parallel: sysctl -n hw.logicalcpu

          - name: windows
            os: ubuntu-24.04
            artifact: native-windows-x86_64
            lib_name: libquickjs-java-wrapper.dll
            c_flags: "-O2 -ffunction-sections -fdata-sections"
            cxx_flags: "-O2 -ffunction-sections -fdata-sections"
            link_flags: "-static-libgcc -static-libstdc++ -static -Wl,--gc-sections -Wl,--strip-all"
            parallel: nproc
            is_cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Install MinGW cross-compiler
        if: matrix.is_cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 ninja-build

      - name: Prepare Windows JNI header
        if: matrix.is_cross
        run: |
          mkdir -p /tmp/jni-win32
          echo '#define JNIEXPORT __declspec(dllexport)' > /tmp/jni-win32/jni_md.h
          echo '#define JNIIMPORT __declspec(dllimport)' >> /tmp/jni-win32/jni_md.h
          echo '#define JNICALL __stdcall' >> /tmp/jni-win32/jni_md.h
          echo 'typedef int jint;' >> /tmp/jni-win32/jni_md.h
          echo 'typedef long long jlong;' >> /tmp/jni-win32/jni_md.h
          echo 'typedef signed char jbyte;' >> /tmp/jni-win32/jni_md.h

      - name: Build
        env:
          JAVA_PLATFORM_INCLUDE: ${{ matrix.is_cross && '/tmp/jni-win32' || '' }}
        run: |
          cd wrapper-java
          cmake -DCMAKE_BUILD_TYPE=MinSizeRel \
                ${{ matrix.is_cross && '-DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32' || '' }} \
                -DCMAKE_C_FLAGS="${{ matrix.c_flags }}" \
                -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}" \
                -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.link_flags }}" \
                -G Ninja -S src/main -B build
          cmake --build build -j $(${{ matrix.parallel }})

      - name: Strip
        if: matrix.is_cross
        run: x86_64-w64-mingw32-strip --strip-all wrapper-java/build/${{ matrix.lib_name }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wrapper-java/build/${{ matrix.lib_name }}

  publish:
    needs: [build-native]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: native-*
          path: native-dist

      - uses: gradle/gradle-build-action@v2

      - name: Build JARs
        run: ./gradlew :wrapper-java:assemble

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts/native
          cp -r native-dist/native-*/* release-artifacts/native/ 2>/dev/null || true
          cp wrapper-java/build/libs/*.jar release-artifacts/

      - name: Get release notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$(awk "/^## $VERSION/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md)" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        if: ${{ env.RELEASE_NOTES != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            release-artifacts/native/*
            release-artifacts/*.jar
          fail_on_unmatched_files: false
