name: Publish Release

on:
  push:
    tags:
      - '**'

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: native-linux-x86_64
            lib_name: libquickjs-java-wrapper.so
          - os: macos-14
            artifact: native-macos-x86_64
            lib_name: libquickjs-java-wrapper.dylib
          - os: macos-15
            artifact: native-macos-arm64
            lib_name: libquickjs-java-wrapper.dylib
          - os: windows-2025
            artifact: native-windows-x86_64
            lib_name: libquickjs-java-wrapper.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-2025'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cd wrapper-java
          cmake -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DCMAKE_C_FLAGS="-Os -flto -ffunction-sections -fdata-sections" \
                -DCMAKE_CXX_FLAGS="-Os -flto -ffunction-sections -fdata-sections" \
                -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--gc-sections -Wl,--strip-all" \
                -G Ninja -S src/main -B build
          cmake --build build -j $(nproc)

      - name: Build (macOS)
        if: matrix.os == 'macos-14' || matrix.os == 'macos-15'
        run: |
          cd wrapper-java
          cmake -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DCMAKE_C_FLAGS="-Os -flto" \
                -DCMAKE_CXX_FLAGS="-Os -flto" \
                -G Ninja -S src/main -B build
          cmake --build build -j $(sysctl -n hw.logicalcpu)

      - name: Build (Windows)
        if: matrix.os == 'windows-2025'
        run: cd wrapper-java && cmake -DCMAKE_BUILD_TYPE=MinSizeRel -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_C_FLAGS="/MT /O1 /GS-" -DCMAKE_CXX_FLAGS="/MT /O1 /GS-" -G Ninja -S src/main -B build && cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wrapper-java/build/${{ matrix.lib_name }}

  publish:
    needs: [build-native]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: native-*
          path: native-dist

      - uses: gradle/gradle-build-action@v2

      - name: Build JARs
        run: ./gradlew :wrapper-java:assemble

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts/native
          cp -r native-dist/native-*/* release-artifacts/native/ 2>/dev/null || true
          cp wrapper-java/build/libs/*.jar release-artifacts/

      - name: Get release notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$(awk "/^## $VERSION/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md)" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        if: ${{ env.RELEASE_NOTES != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            release-artifacts/native/*
            release-artifacts/*.jar
          fail_on_unmatched_files: false
